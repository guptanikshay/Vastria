# ===========================================
# CI/CD Pipeline — GitHub Actions
# ===========================================
# WHAT THIS DOES:
# 1. On every push to 'main': runs tests, builds Docker images, pushes to Docker Hub
# 2. On every pull request to 'main': runs tests only (no deploy)
#
# PREREQUISITES (set these in GitHub repo → Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME: Your Docker Hub username
#   - DOCKERHUB_TOKEN: Docker Hub access token (NOT your password)
#   - VITE_GOOGLE_CLIENT_ID: Google OAuth client ID for frontend build
# ===========================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vastria-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/vastria-frontend

jobs:
  # ---------- Job 1: Build & Test Backend ----------
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: vastria-backend/package-lock.json

      - name: Install dependencies
        working-directory: vastria-backend
        run: npm ci

      # Add your tests here when you have them:
      # - name: Run tests
      #   working-directory: vastria-backend
      #   run: npm test

  # ---------- Job 2: Build & Test Frontend ----------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: vastria-frontend/package-lock.json

      - name: Install dependencies
        working-directory: vastria-frontend
        run: npm ci

      - name: Build frontend
        working-directory: vastria-frontend
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

  # ---------- Job 3: Build & Push Docker Images ----------
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend] # Only runs if both builds pass
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Only on push to main

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./vastria-backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./vastria-frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.VM_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy latest images on VM
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" '
            set -e
            cd ~/Vastria
            git pull --ff-only origin main
            docker compose --env-file .env.prod -f docker-compose.prod.yml pull
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
            docker image prune -f
          '
