# ===========================================
# Backend Secret
# ===========================================
# WHY Secrets? They store sensitive data (passwords, API keys) separately
# from your code. Kubernetes encrypts them at rest.
#
# HOW TO USE: Replace the placeholder values with base64-encoded values:
#   echo -n "your_value" | base64
#
# IMPORTANT: Never commit this file with real values to Git!
# In production, use external secret managers (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: vastria-backend-secrets
  namespace: vastria
type: Opaque
data:
  MONGO_URI: <base64-encoded-value>
  JWT_SECRET: <base64-encoded-value>
  CLOUDINARY_CLOUD_NAME: <base64-encoded-value>
  CLOUDINARY_API_KEY: <base64-encoded-value>
  CLOUDINARY_API_SECRET: <base64-encoded-value>
  GEMINI_API_KEY: <base64-encoded-value>
  SERP_API_KEY: <base64-encoded-value>
  GOOGLE_CLIENT_ID: <base64-encoded-value>
  EMAIL_USER: <base64-encoded-value>
  EMAIL_PASS: <base64-encoded-value>
