# ===========================================
# Frontend Deployment
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vastria-frontend
  namespace: vastria
  labels:
    app: vastria-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vastria-frontend
  template:
    metadata:
      labels:
        app: vastria-frontend
    spec:
      containers:
        - name: vastria-frontend
          # Replace <your-dockerhub-username> with your actual Docker Hub username
          image: <your-dockerhub-username>/vastria-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
# ===========================================
# Frontend Service
# ===========================================
apiVersion: v1
kind: Service
metadata:
  name: vastria-frontend
  namespace: vastria
spec:
  selector:
    app: vastria-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
